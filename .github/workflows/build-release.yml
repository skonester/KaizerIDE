name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_version:
        description: "Optional manual version (e.g. 2.0.0)"
        required: false

permissions:
  contents: write

jobs:
  version:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Semantic Versioning
        id: semver
        shell: pwsh
        run: |
          $forced = "${{ github.event.inputs.force_version }}"
          $package = Get-Content package.json | ConvertFrom-Json
          $version = $package.version
          $parts = $version -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]
          # ---------------- FORCE VERSION (MANUAL OVERRIDE) ----------------
          if ($forced) {
            $newVersion = $forced
          }
          else {
            $lastTag = git describe --tags --abbrev=0 2>$null
            if ($lastTag) {
              $commits = git log "$lastTag..HEAD" --pretty=format:"%s"
            } else {
              $commits = git log --pretty=format:"%s"
            }
            $bumpMajor = $false
            $bumpMinor = $false
            $bumpPatch = $false
            foreach ($c in $commits) {
              if ($c -match "BREAKING CHANGE") { $bumpMajor = $true }
              elseif ($c -match "^feat:") { $bumpMinor = $true }
              elseif ($c -match "^fix:" -or $c -match "^chore:") { $bumpPatch = $true }
            }
            if ($bumpMajor) {
              $major++; $minor=0; $patch=0
            }
            elseif ($bumpMinor) {
              $minor++; $patch=0
            }
            elseif ($bumpPatch) {
              $patch++
            }
            $newVersion = "$major.$minor.$patch"
          }
          $package.version = $newVersion
          $package | ConvertTo-Json -Depth 100 | Set-Content package.json
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "tag=v$newVersion" >> $env:GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.semver.outputs.version }}" || echo "No changes to commit"
          git push || echo "Nothing to push"

  # Try Linux first (faster)
  build-electron-linux:
    runs-on: ubuntu-latest
    needs: version
    continue-on-error: true
    outputs:
      success: ${{ steps.check.outputs.success }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Install Wine (for Windows builds on Linux)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Build Electron
        id: build
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare single installer
        if: success()
        run: |
          version="${{ needs.version.outputs.version }}"
          mkdir -p release-final
          for file in release/*.exe; do
            if [ -f "$file" ]; then
              cp "$file" "release-final/KaizerIDE-$version.exe"
              break
            fi
          done

      - name: Check build success
        id: check
        if: success()
        run: echo "success=true" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: electron-build
          path: release-final/*.exe

  # Fallback to Windows if Linux fails
  build-electron-windows:
    runs-on: windows-latest
    needs: [version, build-electron-linux]
    if: needs.build-electron-linux.outputs.success != 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Build Electron
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare single installer
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          mkdir release-final
          Get-ChildItem release/*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-final/KaizerIDE-$version.exe"
            break
          }

      - uses: actions/upload-artifact@v4
        with:
          name: electron-build
          path: release-final/*.exe

  release:
    runs-on: ubuntu-latest
    needs: [version, build-electron-linux, build-electron-windows]
    if: always() && (needs.build-electron-linux.result == 'success' || needs.build-electron-windows.result == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ---------------- CHANGELOG ----------------
      - name: Generate changelog
        id: changelog
        run: |
          lastTag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$lastTag" ]; then
            commits=$(git log "$lastTag..HEAD" --pretty=format:"%s")
          else
            commits=$(git log --pretty=format:"%s")
          fi
          
          body=$(echo "$commits" | grep -v -E "(merge|wip)" | sed 's/^/- /' || echo "")
          
          if [ -z "$body" ]; then
            body="Minor updates and improvements"
          fi
          
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------- RELEASE ----------------
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: KaizerIDE v${{ needs.version.outputs.version }}
          files: artifacts/electron-build/*.exe
          body: |
            ## 🚀 KaizerIDE v${{ needs.version.outputs.version }}
            ${{ steps.changelog.outputs.changes }}
            ---
            ⚡ Auto build system
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
