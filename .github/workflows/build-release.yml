name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Versioning
        id: semver
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $version = $package.version
          $parts = $version -split '\.'

          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          $lastTag = git describe --tags --abbrev=0 2>$null

          if ($lastTag) {
            $commits = git log "$lastTag..HEAD" --pretty=format:"%s"
          } else {
            $commits = git log --pretty=format:"%s"
          }

          $bumpMajor = $false
          $bumpMinor = $false
          $bumpPatch = $false

          foreach ($c in $commits) {
            if ($c -match "BREAKING CHANGE") { $bumpMajor = $true }
            elseif ($c -match "^feat:") { $bumpMinor = $true }
            elseif ($c -match "^fix:" -or $c -match "^chore:") { $bumpPatch = $true }
          }

          if ($bumpMajor) {
            $major++
            $minor = 0
            $patch = 0
          }
          elseif ($bumpMinor) {
            $minor++
            $patch = 0
          }
          elseif ($bumpPatch) {
            $patch++
          }

          $newVersion = "$major.$minor.$patch"

          $package.version = $newVersion
          $package | ConvertTo-Json -Depth 100 | Set-Content package.json

          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "tag=v$newVersion" >> $env:GITHUB_OUTPUT

  build-vite:
    runs-on: windows-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Build Vite
        run: npm run build
        env:
          NODE_ENV: production

      - uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: dist

  build-electron:
    runs-on: windows-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Install icon deps
        run: npm install sharp png-to-ico

      - name: Convert icon
        shell: pwsh
        run: |
          node -e "const sharp=require('sharp');const fs=require('fs');async function c(){await sharp('docs/images/logo.png').resize(256,256,{fit:'contain',background:{r:0,g:0,b:0,alpha:0}}).png().toFile('docs/images/logo-256.png');const {default:pngToIco}=await import('png-to-ico');const buf=await pngToIco(['docs/images/logo-256.png']);fs.writeFileSync('docs/images/logo.ico',buf);}c().catch(e=>{console.error(e);process.exit(1);});"

      - name: Build Electron
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: electron-build
          path: release/*.exe

  release:
    runs-on: windows-latest
    needs: [version, build-vite, build-electron]

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ---------------- CHANGELOG ----------------
      - name: Generate categorized changelog
        id: changelog
        shell: pwsh
        run: |
          $lastTag = git describe --tags --abbrev=0 2>$null

          if ($lastTag) {
            $commits = git log "$lastTag..HEAD" --pretty=format:"%s"
          } else {
            $commits = git log --pretty=format:"%s"
          }

          $feat = @()
          $fix = @()
          $chore = @()
          $breaking = @()

          foreach ($c in $commits) {
            if ($c -match "BREAKING CHANGE") { $breaking += "- $c" }
            elseif ($c -match "^feat:") { $feat += "- $c" }
            elseif ($c -match "^fix:") { $fix += "- $c" }
            elseif ($c -match "^chore:") { $chore += "- $c" }
          }

          $body = ""

          if ($breaking.Count -gt 0) {
            $body += "## ⚠️ Breaking Changes`n$($breaking -join "`n")`n`n"
          }

          if ($feat.Count -gt 0) {
            $body += "## ✨ Features`n$($feat -join "`n")`n`n"
          }

          if ($fix.Count -gt 0) {
            $body += "## 🐛 Fixes`n$($fix -join "`n")`n`n"
          }

          if ($chore.Count -gt 0) {
            $body += "## 🧹 Chores`n$($chore -join "`n")"
          }

          if (-not $body) {
            $body = "Minor updates and improvements"
          }

          echo "changes<<EOF" >> $env:GITHUB_OUTPUT
          echo "$body" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      # ---------------- RELEASE ----------------
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: KaizerIDE v${{ needs.version.outputs.version }}
          files: artifacts/electron-build/*.exe
          body: |
            ## 🚀 KaizerIDE v${{ needs.version.outputs.version }}

            ${{ steps.changelog.outputs.changes }}

            ---
            ⚡ Built automatically via CI/CD pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
