name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_version:
        description: "Optional manual version (e.g. 2.0.0)"
        required: false

permissions:
  contents: write

jobs:
  # Install dependencies once and cache for all jobs
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache node_modules
        uses: actions/cache/save@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  version:
    runs-on: ubuntu-latest
    needs: install
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore node_modules
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Semantic Versioning
        id: semver
        shell: bash
        run: |
          forced="${{ github.event.inputs.force_version }}"
          version=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$version"
          
          if [ -n "$forced" ]; then
            newVersion="$forced"
          else
            lastTag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$lastTag" ]; then
              commits=$(git log "$lastTag..HEAD" --pretty=format:"%s")
            else
              commits=$(git log --pretty=format:"%s")
            fi
            
            bumpMajor=false
            bumpMinor=false
            bumpPatch=false
            
            while IFS= read -r c; do
              if [[ "$c" =~ "BREAKING CHANGE" ]]; then
                bumpMajor=true
              elif [[ "$c" =~ ^feat: ]]; then
                bumpMinor=true
              elif [[ "$c" =~ ^fix: ]] || [[ "$c" =~ ^chore: ]]; then
                bumpPatch=true
              fi
            done <<< "$commits"
            
            if [ "$bumpMajor" = true ]; then
              major=$((major + 1))
              minor=0
              patch=0
            elif [ "$bumpMinor" = true ]; then
              minor=$((minor + 1))
              patch=0
            elif [ "$bumpPatch" = true ]; then
              patch=$((patch + 1))
            fi
            
            newVersion="$major.$minor.$patch"
          fi
          
          node -e "const pkg=require('./package.json'); pkg.version='$newVersion'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          echo "version=$newVersion" >> $GITHUB_OUTPUT
          echo "tag=v$newVersion" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.semver.outputs.version }}" || echo "No changes to commit"
          git push || echo "Nothing to push"

  # Try Linux first (faster)
  build-electron-linux:
    runs-on: ubuntu-latest
    needs: [install, version]
    continue-on-error: true
    outputs:
      success: ${{ steps.check.outputs.success }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build Electron
        id: build
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare single installer
        if: success()
        run: |
          version="${{ needs.version.outputs.version }}"
          mkdir -p release-final
          for file in release/*.exe; do
            if [ -f "$file" ]; then
              cp "$file" "release-final/KaizerIDE-$version.exe"
              break
            fi
          done

      - name: Check build success
        id: check
        if: success()
        run: echo "success=true" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: electron-build
          path: release-final/*.exe

  # Fallback to Windows if Linux fails
  build-electron-windows:
    runs-on: windows-latest
    needs: [install, version, build-electron-linux]
    if: needs.build-electron-linux.outputs.success != 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build Electron
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare single installer
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          mkdir release-final
          Get-ChildItem release/*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-final/KaizerIDE-$version.exe"
            break
          }

      - uses: actions/upload-artifact@v4
        with:
          name: electron-build
          path: release-final/*.exe

  release:
    runs-on: ubuntu-latest
    needs: [version, build-electron-linux, build-electron-windows]
    if: always() && (needs.build-electron-linux.result == 'success' || needs.build-electron-windows.result == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ---------------- CHANGELOG ----------------
      - name: Generate changelog
        id: changelog
        run: |
          lastTag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$lastTag" ]; then
            commits=$(git log "$lastTag..HEAD" --pretty=format:"%s")
          else
            commits=$(git log --pretty=format:"%s")
          fi
          
          body=$(echo "$commits" | grep -v -E "(merge|wip)" | sed 's/^/- /' || echo "")
          
          if [ -z "$body" ]; then
            body="Minor updates and improvements"
          fi
          
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------- RELEASE ----------------
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: KaizerIDE v${{ needs.version.outputs.version }}
          files: artifacts/electron-build/*.exe
          body: |
            ## 🚀 KaizerIDE v${{ needs.version.outputs.version }}
            ${{ steps.changelog.outputs.changes }}
            ---
            ⚡ Auto build system
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
