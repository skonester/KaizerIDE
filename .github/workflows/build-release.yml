name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Get version from package.json
        id: package_version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT
      
      - name: Install dependencies (fast)
        run: npm ci --prefer-offline --no-audit
      
      - name: Build Vite app (production)
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Build Electron app (optimized)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_COMPRESSION_LEVEL: 0
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KaizerIDE-Windows-x64-v${{ steps.package_version.outputs.version }}
          path: |
            release/*.exe
          retention-days: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.package_version.outputs.tag }}
          name: KaizerIDE v${{ steps.package_version.outputs.version }}
          files: |
            release/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## KaizerIDE v${{ steps.package_version.outputs.version }}
            
            ### 🚀 What's New
            Auto-generated release from commit ${{ github.sha }}
            
            ### 📦 Download
            Download the installer below and run it to install KaizerIDE.
            
            ### ✨ Features
            - Windows context menu integration
            - Dark mode installer
            - AI-powered coding assistant
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
